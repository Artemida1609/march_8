<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>З 8 Березня 🌹</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=Cinzel:wght@400;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 100vw; height: 100vh; overflow: hidden;
    background: radial-gradient(ellipse at 50% 45%, #1e0030 0%, #0e0020 45%, #050008 100%);
    font-family: 'Cormorant Garamond', Georgia, serif;
    cursor: default;
    user-select: none; -webkit-user-select: none;
  }

  .screen {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    z-index: 10;
  }
  .screen.hidden { display: none; }

  /* ===================== ENVELOPE SCREEN ===================== */
  #envelopeScreen { flex-direction: column; gap: clamp(14px,3vh,26px); }

  .envelope-wrap {
    position: relative;
    width: clamp(220px, 58vw, 320px);
    cursor: pointer;
    filter: drop-shadow(0 0 32px rgba(255,100,160,0.45));
    transition: filter 0.3s;
  }
  .envelope-wrap:active { filter: drop-shadow(0 0 56px rgba(255,100,160,0.75)); }

  /* Envelope body */
  .env-body {
    position: relative;
    width: 100%;
    padding-top: 70%; /* 10:7 ratio */
    border-radius: 4px 4px 12px 12px;
    background: linear-gradient(160deg, #8b1a4a 0%, #5a0a2e 45%, #3d061e 100%);
    box-shadow: inset 0 2px 8px rgba(255,180,210,0.18), 0 10px 36px rgba(0,0,0,0.6);
    overflow: hidden;
  }

  /* Inside glow seen from top */
  .env-inner {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 50% 60%, rgba(255,160,200,0.13) 0%, transparent 70%);
    pointer-events: none;
  }

  /* Hearts overlay */
  .env-hearts {
    position: absolute; inset: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 1;
  }
  .eh { transform-box: fill-box; transform-origin: center; }
  .eh1 { animation: hbeat 3.2s ease-in-out infinite; }
  .eh2 { animation: hbeat 2.7s ease-in-out infinite 0.4s; }
  .eh3 { animation: hbeat 3.5s ease-in-out infinite 0.9s; }
  .eh4 { animation: hbeat 2.9s ease-in-out infinite 0.2s; }
  .eh5 { animation: hbeat 3.1s ease-in-out infinite 1.1s; }
  .eh6 { animation: hbeat 2.5s ease-in-out infinite 0.6s; }
  @keyframes hbeat {
    0%,100% { transform: scale(1); opacity: 1; }
    30%      { transform: scale(1.18); opacity: 0.85; }
    50%      { transform: scale(0.95); opacity: 1; }
    70%      { transform: scale(1.10); opacity: 0.9; }
  }

  /* Top flap — animates open */
  .env-flap {
    position: absolute;
    top: 0; left: -1px; right: -1px;
    height: 0;
    border-left: calc(clamp(220px,58vw,320px)/2 + 1px) solid transparent;
    border-right: calc(clamp(220px,58vw,320px)/2 + 1px) solid transparent;
    border-top: clamp(70px,20vw,112px) solid #7a1040;
    transform-origin: top center;
    transition: transform 0.7s cubic-bezier(0.34, 1.3, 0.64, 1);
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.4));
    z-index: 4;
  }

  /* Wax seal */
  .env-seal {
    position: absolute;
    top: clamp(52px,15vw,84px); left: 50%; transform: translateX(-50%) translateY(-50%);
    width: clamp(36px,9vw,52px); height: clamp(36px,9vw,52px);
    z-index: 5;
    transition: opacity 0.3s, transform 0.3s;
  }
  .env-seal svg { width: 100%; height: 100%; }

  /* Letter peeking out */
  .env-letter {
    position: absolute;
    bottom: 8%; left: 12%; right: 12%;
    height: 0;
    background: linear-gradient(170deg, #fff8f5 0%, #ffe8f0 60%, #fce0ea 100%);
    border-radius: 4px 4px 0 0;
    transform-origin: bottom center;
    transform: scaleY(0) translateY(0);
    transition: transform 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) 0.15s,
                height 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) 0.15s;
    z-index: 3;
    display: flex; align-items: flex-start; justify-content: center;
    overflow: hidden;
  }
  .env-letter-rose {
    font-size: clamp(1.4rem, 5vw, 2rem);
    padding-top: 8%;
    opacity: 0;
    transition: opacity 0.4s 0.5s;
  }

  /* Open state */
  .envelope-wrap.open .env-flap {
    transform: perspective(500px) rotateX(-175deg);
  }
  .envelope-wrap.open .env-seal {
    opacity: 0; transform: translateX(-50%) translateY(-50%) scale(0.6);
  }
  .envelope-wrap.open .env-letter {
    height: clamp(50px, 14vw, 80px);
    transform: scaleY(1) translateY(-8%);
  }
  .envelope-wrap.open .env-letter-rose {
    opacity: 1;
  }

  .env-hint {
    color: rgba(255,200,220,0.65);
    font-size: clamp(0.78rem, 3.8vw, 0.92rem);
    letter-spacing: 0.28em; text-transform: uppercase;
    font-family: 'Cinzel', serif;
    animation: pulse-hint 2.5s ease-in-out infinite;
  }
  @keyframes pulse-hint { 0%,100%{opacity:0.45} 50%{opacity:1} }

  /* ===================== PASSWORD SCREEN ===================== */
  #passScreen { flex-direction: column; align-items: center; gap: clamp(16px,4vh,32px); }
  .pass-title {
    font-family: 'Cinzel', serif;
    font-size: clamp(1rem,4vw,1.5rem);
    color: rgba(255,200,220,0.9); letter-spacing: 0.15em; text-align: center;
  }
  .pass-dots { display: flex; gap: clamp(10px,3vw,16px); }
  .pass-dot {
    width: clamp(16px,4vw,22px); height: clamp(16px,4vw,22px);
    border-radius: 50%; border: 2px solid rgba(255,120,160,0.6);
    background: transparent; transition: background 0.2s, border-color 0.2s;
  }
  .pass-dot.filled {
    background: radial-gradient(circle, #ff88bb, #dd1155);
    border-color: #ff88bb; box-shadow: 0 0 10px rgba(255,100,160,0.8);
  }
  .pass-dot.wrong {
    background: radial-gradient(circle, #ff4444, #aa0000);
    border-color: #ff4444; animation: shake 0.4s ease;
  }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
  .pass-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: clamp(10px,3vw,16px); }
  .pass-btn {
    width: clamp(64px,17vw,82px); height: clamp(64px,17vw,82px);
    border-radius: 50%; border: 1.5px solid rgba(255,120,160,0.4);
    background: rgba(80,10,40,0.7); color: rgba(255,200,220,0.9);
    font-family: 'Cinzel', serif; font-size: clamp(1.2rem,4vw,1.5rem);
    cursor: pointer; transition: background 0.15s, transform 0.1s;
    -webkit-tap-highlight-color: transparent;
  }
  .pass-btn:active { background: rgba(180,20,80,0.6); transform: scale(0.93); }
  .pass-clear { grid-column: 1; font-size: clamp(0.9rem,3vw,1rem); }
  .pass-zero  { grid-column: 2; }
  .pass-del   { grid-column: 3; }
  .pass-error {
    color: rgba(255,80,100,0.9); font-size: clamp(0.8rem,3vw,0.9rem);
    letter-spacing: 0.1em; min-height: 1.4em; text-align: center;
  }

  /* ===================== CARD SCREEN ===================== */
  #cardScreen { perspective: 1200px; }
  .card-wrap {
    position: relative; width: min(360px, 88vw);
    animation: cardFlyIn 1.0s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
  }
  @keyframes cardFlyIn {
    from { transform: translateY(60vh) scale(0.6); opacity: 0; }
    to   { transform: translateY(0) scale(1); opacity: 1; }
  }
  .card {
    background: linear-gradient(145deg, #fff8f8 0%, #ffe8f0 40%, #fff0f5 70%, #fce0ea 100%);
    border-radius: 16px;
    padding: clamp(24px,6vw,48px) clamp(20px,5vw,40px);
    box-shadow: 0 12px 50px rgba(180,20,80,0.3), 0 4px 20px rgba(0,0,0,0.3);
    position: relative; overflow: hidden; text-align: center;
  }
  .card-border {
    position: absolute; inset: 8px;
    border: 1.5px solid rgba(200,80,120,0.25); border-radius: 10px;
    pointer-events: none;
  }
  .card-flowers { font-size: clamp(2rem,9vw,3.5rem); margin-bottom: clamp(8px,2vh,16px); display: block; }
  .card-heading {
    font-family: 'Cinzel', serif; font-size: clamp(1.4rem,6vw,2.4rem);
    color: #8b1a4a; margin-bottom: clamp(10px,2.5vh,18px); line-height: 1.2;
  }
  .card-text {
    font-size: clamp(1rem,3.5vw,1.25rem); color: #5a2035;
    line-height: 1.75; font-style: italic; margin-bottom: clamp(16px,4vh,30px);
  }
  .card-sign {
    font-size: clamp(0.9rem,2.8vw,1.05rem); color: rgba(120,40,70,0.7);
    letter-spacing: 0.12em; margin-bottom: clamp(18px,4vh,32px);
  }
  .card-btn {
    display: inline-flex; align-items: center; gap: 10px;
    padding: clamp(14px,3vh,18px) clamp(28px,6vw,40px);
    border-radius: 50px; border: none;
    background: linear-gradient(135deg, #c0185a, #e8224a, #c0185a);
    color: white; font-family: 'Cinzel', serif;
    font-size: clamp(1rem,3.5vw,1.1rem); letter-spacing: 0.12em;
    cursor: pointer; position: relative; z-index: 5;
    box-shadow: 0 4px 20px rgba(200,20,80,0.5);
    -webkit-tap-highlight-color: transparent;
    transition: transform 0.15s;
  }
  .card-btn:active { transform: scale(0.96); }

  /* ===================== BOUQUET LAYER ===================== */
  #bouquetLayer { position: fixed; inset: 0; z-index: 200; display: none; }
  #bouquetCanvas { position: absolute; inset: 0; width: 100%; height: 100%; cursor: pointer; touch-action: none; }
  #text-overlay {
    position: absolute; bottom: 10%; width: 100%;
    text-align: center; opacity: 0;
    transform: translateY(20px);
    transition: opacity 1.5s ease, transform 1.5s ease;
    pointer-events: none;
  }
  #text-overlay.visible { opacity: 1; transform: translateY(0); }
  .main-text {
    font-size: clamp(1.8rem,6.5vw,3.2rem); color: #fff;
    text-shadow: 0 0 30px rgba(255,150,180,0.9), 0 0 60px rgba(255,100,150,0.5);
    letter-spacing: 0.05em; font-style: italic; line-height: 1.2;
  }
  .sub-text {
    font-size: clamp(0.9rem,3vw,1.5rem); color: rgba(255,220,230,0.92);
    margin-top: 0.4em; letter-spacing: 0.18em;
    text-shadow: 0 0 20px rgba(255,150,180,0.7); font-style: italic;
  }
  #bouquet-hint {
    position: absolute; top: 10%; width: 100%;
    text-align: center; color: rgba(255,190,210,0.55);
    font-size: clamp(0.7rem,2.5vw,0.85rem); letter-spacing: 0.2em;
    pointer-events: none; transition: opacity 1s;
    font-family: 'Cinzel', serif;
  }
  #bouquet-hint.hide { opacity: 0; }
</style>
</head>
<body>

  <div class="envelope-wrap" id="envelopeWrap">
    <!-- Flap -->
    <div class="env-flap"></div>
    <!-- Seal -->
    <div class="env-seal">
      <svg viewBox="0 0 52 52" fill="none">

<script>
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x,y,w,h,r){
    const ra=Array.isArray(r)?r:[r,r,r,r];
    const[tl,tr,br,bl]=[ra[0]||0,ra[1]||0,ra[2]||0,ra[3]||0];
    this.beginPath();
    this.moveTo(x+tl,y);
    this.lineTo(x+w-tr,y);this.arcTo(x+w,y,x+w,y+tr,tr);
    this.lineTo(x+w,y+h-br);this.arcTo(x+w,y+h,x+w-br,y+h,br);
    this.lineTo(x+bl,y+h);this.arcTo(x,y+h,x,y+h-bl,bl);
    this.lineTo(x,y+tl);this.arcTo(x,y,x+tl,y,tl);
    this.closePath();return this;
  };
}

const isMobile=/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)||window.innerWidth<768;

function showOnly(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.add('hidden'));
  if(id) document.getElementById(id).classList.remove('hidden');
}

/* ===================== ENVELOPE ===================== */
document.getElementById('envelopeWrap').addEventListener('click',()=>{
  const wrap=document.getElementById('envelopeWrap');
  wrap.classList.add('open');
  // Hide hint
  document.querySelector('.env-hint').style.opacity='0';
  setTimeout(()=>{
    showOnly('passScreen');
    passReset();
  }, 900);
});

/* ===================== PASSWORD ===================== */
const SECRET='0308';
let passInput='';
function passReset(){ passInput=''; renderDots(); document.getElementById('passError').textContent=''; }
function renderDots(){
  document.querySelectorAll('.pass-dot').forEach((d,i)=>{
    d.classList.remove('filled','wrong');
    if(i<passInput.length) d.classList.add('filled');
  });
}
document.getElementById('passGrid').addEventListener('click',e=>{
  const btn=e.target.closest('.pass-btn'); if(!btn) return;
  const v=btn.dataset.v;
  if(v==='clear'){passInput='';renderDots();document.getElementById('passError').textContent='';return;}
  if(v==='del'){passInput=passInput.slice(0,-1);renderDots();return;}
  if(passInput.length>=4) return;
  passInput+=v; renderDots();
  if(passInput.length===4) setTimeout(checkPass,200);
});
function checkPass(){
  if(passInput===SECRET){
    showOnly(null);
    // Brief flash then show card
    showCard();
  } else {
    document.querySelectorAll('.pass-dot').forEach(d=>{d.classList.remove('filled');d.classList.add('wrong');});
    document.getElementById('passError').textContent='Невірний пароль 💔';
    setTimeout(()=>{
      document.querySelectorAll('.pass-dot').forEach(d=>d.classList.remove('wrong'));
      passInput=''; renderDots(); document.getElementById('passError').textContent='';
    },1000);
  }
}

function showCard(){ showOnly('cardScreen'); }

document.getElementById('flowersBtn').addEventListener('click',function(){
  showOnly(null);
  document.getElementById('bouquetLayer').style.display='block';
  startBouquet();
});

/* ===================== BOUQUET ===================== */
function startBouquet(){
  const canvas=document.getElementById('bouquetCanvas');
  const ctx=canvas.getContext('2d',{alpha:false});
  let W,H,cx,cy;
  const dpr=isMobile?Math.min(window.devicePixelRatio||1,1.5):(window.devicePixelRatio||1);
  function resize(){
    W=window.innerWidth;H=window.innerHeight;
    canvas.width=W*dpr;canvas.height=H*dpr;
    canvas.style.width=W+'px';canvas.style.height=H+'px';
    ctx.setTransform(1,0,0,1,0,0);ctx.scale(dpr,dpr);
    cx=W/2;cy=H/2;
  }
  resize();
  window.addEventListener('resize',()=>{resize();initBouquet();});

  const easeInOut=t=>t<.5?2*t*t:-1+(4-2*t)*t;
  const easeOut=t=>1-Math.pow(1-t,3);

  function lighten(hex,a){return`rgb(${Math.min(255,parseInt(hex.slice(1,3),16)+a)},${Math.min(255,parseInt(hex.slice(3,5),16)+a)},${Math.min(255,parseInt(hex.slice(5,7),16)+a)})`;}
  function darken(hex,a){return`rgb(${Math.max(0,parseInt(hex.slice(1,3),16)-a)},${Math.max(0,parseInt(hex.slice(3,5),16)-a)},${Math.max(0,parseInt(hex.slice(5,7),16)-a)})`;}

  let wrappingP=0,roses=[];

  function getBouquetBounds(){
    if(!roses||!roses.length) return null;
    let minX=Infinity,maxX=-Infinity;
    for(const r of roses){if(minX>r.tx)minX=r.tx;if(maxX<r.tx)maxX=r.tx;}
    const sorted=[...roses].sort((a,b)=>b.ty-a.ty);
    const rr=sorted[0].size*5.5;
    const rowYs=[...new Set(sorted.map(r=>Math.round(r.ty/5)*5))];
    const secondY=rowYs.length>1?rowYs[1]:rowYs[0];
    return{minX,maxX,rimY:secondY-rr*1.1};
  }

  function drawRose(x,y,size,rotation,color,alpha,bloom){
    ctx.save();ctx.globalAlpha=alpha;ctx.translate(x,y);ctx.rotate(rotation);ctx.scale(size,size);
    const bp=Math.max(0,Math.min(1,bloom));const baseR=5.5;
    const allLayers=[
      {n:7,r:baseR*.55,offsetR:baseR*.28,tilt:.95,sizeX:.50,sizeY:.62},
      {n:8,r:baseR*.80,offsetR:baseR*.40,tilt:.72,sizeX:.52,sizeY:.68},
      {n:9,r:baseR*1.0,offsetR:baseR*.50,tilt:.50,sizeX:.54,sizeY:.72},
      {n:10,r:baseR*1.15,offsetR:baseR*.57,tilt:.28,sizeX:.55,sizeY:.70},
      {n:11,r:baseR*1.25,offsetR:baseR*.62,tilt:.10,sizeX:.53,sizeY:.65},
    ];
    const layers=isMobile?allLayers.slice(0,3):allLayers;
    layers.forEach((layer,li)=>{
      if(bp<li*.18) return;
      const layerBp=Math.min(1,(bp-li*.18)/.5);
      for(let i=0;i<layer.n;i++){
        const angle=(i/layer.n)*Math.PI*2+li*.42;
        const r=layer.r*layerBp;
        const ox=Math.cos(angle)*r*.5,oy=Math.sin(angle)*r*.5;
        ctx.save();ctx.translate(ox,oy);ctx.rotate(angle+Math.PI*.5);
        const lightV=li===0?35:li===1?20:li===2?8:0;
        const grad=ctx.createRadialGradient(0,-r*layer.offsetR/r*.4,0,0,r*.1,r*layer.r/baseR*1.1);
        grad.addColorStop(0,lighten(color,lightV+25));grad.addColorStop(.45,lighten(color,lightV));grad.addColorStop(1,darken(color,18));
        ctx.fillStyle=grad;ctx.beginPath();ctx.ellipse(0,-r*layer.offsetR/r*layerBp,r*layer.sizeX*layerBp,r*layer.sizeY*layerBp,0,0,Math.PI*2);ctx.fill();ctx.restore();
      }
    });
    if(!isMobile){
      for(let i=0;i<6;i++){
        const angle=(i/6)*Math.PI*2+.25,r=baseR*.30*bp;
        ctx.save();ctx.translate(Math.cos(angle)*r*.3,Math.sin(angle)*r*.3);ctx.rotate(angle+Math.PI/2);
        const ig=ctx.createRadialGradient(0,0,0,0,0,r);ig.addColorStop(0,lighten(color,55));ig.addColorStop(1,lighten(color,10));
        ctx.fillStyle=ig;ctx.beginPath();ctx.ellipse(0,-r*.38,r*.32,r*.46,0,0,Math.PI*2);ctx.fill();ctx.restore();
      }
    }
    const cg=ctx.createRadialGradient(0,0,0,0,0,baseR*.28*bp);cg.addColorStop(0,lighten(color,70));cg.addColorStop(1,lighten(color,20));
    ctx.fillStyle=cg;ctx.beginPath();ctx.arc(0,0,baseR*.28*bp,0,Math.PI*2);ctx.fill();ctx.restore();
  }

  function getWrappingGeometry(fy){
    const b=getBouquetBounds();const sc=Math.min(W,H)/460;
    let cw,ct,cb;
    if(b){const sp=(b.maxX-b.minX)*.5;cw=sp+18*sc;ct=b.rimY-(cy+fy);cb=ct+cw*2.8;}
    else{cw=145*sc;ct=55*sc;cb=ct+380*sc;}
    return{cw,ct,cb};
  }

  function drawWrapping(p,fy){
    if(p<=0) return;
    const{cw,ct,cb}=getWrappingGeometry(fy);const sc=Math.min(W,H)/460;
    const slideEase=t=>1-Math.pow(1-t,3);
    const slideY=(1-slideEase(Math.min(1,p)))*H*0.55;
    ctx.save();ctx.globalAlpha=Math.min(1,p*2.5);ctx.translate(cx,cy+fy+slideY);
    ctx.save();ctx.globalAlpha*=.25;ctx.fillStyle='#1a0020';
    ctx.beginPath();ctx.ellipse(6*sc,ct+(cb-ct)*.55,cw*.55,10*sc,0,0,Math.PI*2);ctx.fill();ctx.restore();
    ctx.save();ctx.beginPath();ctx.moveTo(-cw,ct);ctx.lineTo(0,cb);ctx.lineTo(cw,ct);ctx.closePath();
    const bg=ctx.createLinearGradient(-cw,ct,cw,ct);bg.addColorStop(0,'#d4849a');bg.addColorStop(.5,'#e8a0b2');bg.addColorStop(1,'#d4849a');
    ctx.fillStyle=bg;ctx.fill();ctx.restore();
    ctx.save();ctx.beginPath();ctx.moveTo(-cw,ct);ctx.lineTo(0,cb);ctx.lineTo(0,ct);ctx.closePath();
    const ll=ctx.createLinearGradient(-cw,0,0,0);ll.addColorStop(0,'#c4748a');ll.addColorStop(.6,'#f0b0c5');ll.addColorStop(1,'#fad0df');
    ctx.fillStyle=ll;ctx.fill();ctx.restore();
    ctx.save();ctx.beginPath();ctx.moveTo(cw,ct);ctx.lineTo(0,cb);ctx.lineTo(0,ct);ctx.closePath();
    const rl=ctx.createLinearGradient(0,0,cw,0);rl.addColorStop(0,'#fad0df');rl.addColorStop(.4,'#f0b0c5');rl.addColorStop(1,'#c4748a');
    ctx.fillStyle=rl;ctx.fill();ctx.restore();
    ctx.save();ctx.beginPath();ctx.moveTo(-cw,ct);ctx.bezierCurveTo(-cw*.6,ct-22*sc,cw*.6,ct-22*sc,cw,ct);ctx.bezierCurveTo(cw*.6,ct+12*sc,-cw*.6,ct+12*sc,-cw,ct);ctx.closePath();
    const rg=ctx.createLinearGradient(-cw,ct-20*sc,cw,ct+10*sc);rg.addColorStop(0,'#fce0ea');rg.addColorStop(.3,'#f8c8d8');rg.addColorStop(.7,'#fce0ea');rg.addColorStop(1,'#ebb0c4');
    ctx.fillStyle=rg;ctx.shadowColor='rgba(200,80,120,.3)';ctx.shadowBlur=6*sc;ctx.fill();ctx.restore();
    ctx.restore();
  }

  function drawWrappingCover(p,fy){
    if(p<=0) return;
    const{cw,ct,cb}=getWrappingGeometry(fy);
    const slideEase=t=>1-Math.pow(1-t,3);
    const slideY=(1-slideEase(Math.min(1,p)))*H*0.55;
    ctx.save();ctx.globalAlpha=Math.min(1,p*2.5);ctx.translate(cx,cy+fy+slideY);
    ctx.beginPath();ctx.moveTo(-cw,ct);ctx.lineTo(0,cb);ctx.lineTo(cw,ct);ctx.closePath();ctx.clip();
    const bg=ctx.createLinearGradient(-cw,ct,cw,ct);bg.addColorStop(0,'#d4849a');bg.addColorStop(.5,'#e8a0b2');bg.addColorStop(1,'#d4849a');
    ctx.fillStyle=bg;ctx.fillRect(-cw*1.1,ct,cw*2.2,cb-ct+4);
    ctx.save();ctx.beginPath();ctx.moveTo(-cw,ct);ctx.lineTo(0,cb);ctx.lineTo(0,ct);ctx.closePath();
    const ll=ctx.createLinearGradient(-cw,0,0,0);ll.addColorStop(0,'#c4748a');ll.addColorStop(.6,'#f0b0c5');ll.addColorStop(1,'#fad0df');ctx.fillStyle=ll;ctx.fill();ctx.restore();
    ctx.save();ctx.beginPath();ctx.moveTo(cw,ct);ctx.lineTo(0,cb);ctx.lineTo(0,ct);ctx.closePath();
    const rl=ctx.createLinearGradient(0,0,cw,0);rl.addColorStop(0,'#fad0df');rl.addColorStop(.4,'#f0b0c5');rl.addColorStop(1,'#c4748a');ctx.fillStyle=rl;ctx.fill();ctx.restore();
    ctx.restore();
  }

  function drawRibbon(rp,bp,fy){
    if(rp<=0) return;
    const b=getBouquetBounds();const sc=Math.min(W,H)/460;let ry,width;
    if(b){const{cw,ct,cb}=getWrappingGeometry(fy);const ch=cb-ct;ry=cy+fy+ct+ch*.28;const tt=(ry-(cy+fy+ct))/ch;width=cw*(1-tt*.9)*rp;}
    else{ry=cy+140*sc+fy;width=105*sc*rp;}
    const bx=cx,by=ry;ctx.save();ctx.globalAlpha=Math.min(1,rp*2);
    const rg=ctx.createLinearGradient(bx-width,by,bx+width,by);rg.addColorStop(0,'#aa0040');rg.addColorStop(.3,'#ee1155');rg.addColorStop(.5,'#ff6699');rg.addColorStop(.7,'#ee1155');rg.addColorStop(1,'#aa0040');
    ctx.fillStyle=rg;ctx.shadowColor='#ff3377';ctx.shadowBlur=10*sc;const rh=8*sc;ctx.roundRect(bx-width,by-rh/2,width*2,rh,rh/2);ctx.fill();
    ctx.shadowBlur=4*sc;ctx.fillStyle='#ff88bb';ctx.beginPath();ctx.ellipse(bx,by,9*sc,7*sc,0,0,Math.PI*2);ctx.fill();
    if(bp>0){const bs=26*sc*bp;for(let s=-1;s<=1;s+=2){ctx.save();ctx.translate(bx+s*5*sc,by);const bg=ctx.createRadialGradient(s*bs*.35,-bs*.28,0,0,0,bs*1.1);bg.addColorStop(0,'#ff99cc');bg.addColorStop(.5,'#ee1155');bg.addColorStop(1,'#990033');ctx.fillStyle=bg;ctx.globalAlpha=Math.min(1,rp*2)*.92;ctx.beginPath();ctx.moveTo(0,0);ctx.bezierCurveTo(s*bs*.25,-bs*.9,s*bs*1.05,-bs*.55,s*bs*.88,0);ctx.bezierCurveTo(s*bs*.65,bs*.38,s*bs*.18,bs*.28,0,0);ctx.fill();ctx.restore();}
    if(bp>.55){const tp=Math.min(1,(bp-.55)/.45);ctx.globalAlpha=Math.min(1,rp*2)*tp;ctx.strokeStyle='#dd1155';ctx.lineWidth=5*sc;ctx.lineCap='round';ctx.shadowBlur=5*sc;for(let s=-1;s<=1;s+=2){ctx.beginPath();ctx.moveTo(bx,by);ctx.bezierCurveTo(bx+s*18*sc,by+16*sc*tp,bx+s*12*sc,by+42*sc*tp,bx+s*22*sc,by+55*sc*tp);ctx.stroke();}}}
    ctx.restore();
  }

  function getLayout(){
    const sc=Math.min(W,H)/460;
    return[
      {x:0,y:-88,s:1.12,r:0},{x:-32,y:-65,s:1.06,r:-.18},{x:0,y:-62,s:1.08,r:.02},{x:32,y:-65,s:1.06,r:.18},
      {x:-62,y:-38,s:1.00,r:-.36},{x:-30,y:-34,s:1.03,r:-.14},{x:0,y:-30,s:1.06,r:.00},{x:30,y:-34,s:1.03,r:.14},{x:62,y:-38,s:1.00,r:.36},
      {x:-74,y:-6,s:.93,r:-.48},{x:-44,y:-2,s:.96,r:-.26},{x:-14,y:2,s:.99,r:-.08},{x:16,y:2,s:.99,r:.08},{x:46,y:-2,s:.96,r:.26},{x:76,y:-6,s:.93,r:.48},
    ].map(p=>({x:cx+p.x*sc,y:cy+p.y*sc-30*sc,size:p.s*sc*2.6,rotation:p.r,hitR:p.s*sc*2.6*5.5}));
  }

  const COLORS=['#cc1133','#d91a3a','#e02040','#c40f2a','#dd1535','#e82545','#b80e28','#cf1232','#e01838','#d61a3c','#c00e2c','#da1840','#e52242','#bb0f2e','#d01535'];
  let phase=0,phaseStart=0,frame=0,ribbonP=0,bowP=0,glowAlpha=0,hintHidden=false,rafId=null;
  const MAX_HEARTS=isMobile?30:80;const hearts=[];

  function spawnHearts(x,y,n=7){
    const count=isMobile?Math.min(4,n):n;
    while(hearts.length+count>MAX_HEARTS) hearts.shift();
    for(let i=0;i<count;i++){hearts.push({x,y,vx:(Math.random()-.5)*3.5,vy:-Math.random()*3.5-1.5,alpha:1,size:Math.random()*16+8,rot:(Math.random()-.5)*.8,life:0,maxLife:55+Math.random()*40,color:Math.random()>.4?'#ff4488':Math.random()>.5?'#ff88bb':'#ffccdd',wobble:Math.random()*Math.PI*2});}
    if(!hintHidden){hintHidden=true;document.getElementById('bouquet-hint').classList.add('hide');}
    if(!rafId) startLoop();
  }

  function drawHeart(x,y,sz,rot,col,alpha){
    ctx.save();ctx.globalAlpha=alpha;ctx.translate(x,y);ctx.rotate(rot);ctx.scale(sz/10,sz/10);
    ctx.fillStyle=col;ctx.beginPath();ctx.moveTo(0,-3.5);ctx.bezierCurveTo(0,-6,-5,-6,-5,-2.5);ctx.bezierCurveTo(-5,.5,0,4,0,6.5);ctx.bezierCurveTo(0,4,5,.5,5,-2.5);ctx.bezierCurveTo(5,-6,0,-6,0,-3.5);ctx.closePath();ctx.fill();ctx.restore();
  }

  function updateHearts(){
    for(let i=hearts.length-1;i>=0;i--){const h=hearts[i];h.life++;h.x+=h.vx+Math.sin(h.life*.12+h.wobble)*.4;h.y+=h.vy;h.vy+=.06;h.vx*=.97;h.rot+=.03;h.alpha=Math.max(0,1-h.life/h.maxLife);if(h.life>=h.maxLife)hearts.splice(i,1);}
  }
  function drawHearts(){for(const h of hearts)drawHeart(h.x,h.y,h.size,h.rot,h.color,h.alpha);}

  function drawBackground(){
    const g=ctx.createRadialGradient(cx,cy*.65,40,cx,cy*.65,Math.max(W,H)*.9);
    g.addColorStop(0,'#1e0030');g.addColorStop(.45,'#0e0020');g.addColorStop(1,'#050008');
    ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  }

  function initBouquet(){
    const layout=getLayout();roses=[];const delayMult=isMobile?.04:.058;
    for(let i=0;i<15;i++){
      const ang=Math.random()*Math.PI*2,dist=Math.max(W,H)*.72+Math.random()*180;
      const sx=cx+Math.cos(ang)*dist,sy=cy+Math.sin(ang)*dist;
      roses.push({sx,sy,x:sx,y:sy,tx:layout[i].x,ty:layout[i].y,size:layout[i].size,rotation:layout[i].rotation+(Math.random()-.5)*.6,targetRot:layout[i].rotation,color:COLORS[i],alpha:0,bloom:0,delay:i*delayMult,hitR:layout[i].hitR});
    }
  }
  function setPhase(p){phase=p;phaseStart=frame;}

  function hitTest(px,py){
    for(let i=roses.length-1;i>=0;i--){const r=roses[i],dx=px-r.x,dy=py-r.y;if(Math.sqrt(dx*dx+dy*dy)<r.hitR*.85)return i;}return -1;
  }
  function handleInteraction(px,py){
    if(phase<2) return;
    const idx=hitTest(px,py);
    if(idx>=0){spawnHearts(roses[idx].x,roses[idx].y,8);}else{spawnHearts(px,py,4);}
  }
  canvas.addEventListener('click',e=>handleInteraction(e.clientX,e.clientY));
  canvas.addEventListener('touchstart',e=>{e.preventDefault();const t=e.touches[0];handleInteraction(t.clientX,t.clientY);},{passive:false});

  const FLIGHT_DUR=isMobile?1.0:1.4;

  function drawScene(){
    ctx.clearRect(0,0,W,H);drawBackground();
    if(glowAlpha>0){const sc=Math.min(W,H)/460;const g=ctx.createRadialGradient(cx,cy-30*sc,15,cx,cy-30*sc,170*sc);g.addColorStop(0,`rgba(255,80,130,${.18*glowAlpha})`);g.addColorStop(.5,`rgba(200,30,80,${.07*glowAlpha})`);g.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);}
    drawWrapping(wrappingP,0);drawWrappingCover(wrappingP,0);
    const sorted=[...roses].sort((a,b)=>a.ty-b.ty);for(const r of sorted){if(r.alpha<=0)continue;drawRose(r.x,r.y,r.size,r.rotation,r.color,r.alpha,r.bloom);}
    const slideEaseD=t=>1-Math.pow(1-t,3);
    const ribbonSlideY=(1-slideEaseD(Math.min(1,wrappingP)))*H*0.55;
    drawRibbon(ribbonP,bowP,ribbonSlideY);drawHearts();
  }

  function startLoop(){
    if(rafId) return;
    function loop(){
      frame++;const el=(frame-phaseStart)/60;
      if(phase===0&&el>.2){initBouquet();setPhase(1);}
      if(phase===1){
        let done=true;
        for(const r of roses){const t=Math.max(0,Math.min(1,(el-r.delay)/FLIGHT_DUR)),te=easeInOut(t);r.x=r.sx+(r.tx-r.sx)*te;r.y=r.sy+(r.ty-r.sy)*te;r.alpha=Math.min(1,t*2.2);r.bloom=easeOut(t);r.rotation+=(r.targetRot-r.rotation)*.08;if(t<1)done=false;}
        if(done&&el>1.4)setPhase(2);
      }
      if(phase===1&&el>0.5){wrappingP=Math.min(1,wrappingP+.028);}
      if(phase>=2){glowAlpha=Math.min(1,glowAlpha+.025);wrappingP=Math.min(1,wrappingP+.035);}
      if(phase===2&&el>.5)setPhase(3);
      if(phase===3){const t=Math.min(1,el/1.1);ribbonP=easeOut(t);bowP=t>.55?easeOut((t-.55)/.45):0;if(t>=1)setPhase(4);}
      if(phase===4){ribbonP=1;bowP=1;if(el>.3)document.getElementById('text-overlay').classList.add('visible');}
      updateHearts();drawScene();
      const animating=phase<4||hearts.length>0;
      if(animating){rafId=requestAnimationFrame(loop);}else{rafId=null;drawScene();}
    }
    rafId=requestAnimationFrame(loop);
  }
  setPhase(0);startLoop();
}
</script>
</body>
</html>
